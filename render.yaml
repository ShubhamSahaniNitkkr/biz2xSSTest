services:
  - type: web
    name: finwell-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build && npx tsx src/db/seed.ts
    startCommand: node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: LLM_API_URL
        value: https://llm-wrapper-741152993481.asia-south1.run.app
      - key: LLM_API_TOKEN
        value: mock
      - key: USE_MOCK_LLM
        value: "true"
      - key: CORS_ORIGIN
        fromService:
          type: web
          name: finwell-web
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: finwell-web
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: finwell-api
          envVarKey: RENDER_EXTERNAL_URL
